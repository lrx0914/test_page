<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽屉交互 - 无AI总结 Tab下钻版 (操作指引更新)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E5E6EB; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #C9CDD4; }
        .text-bd-blue { color: #1664FF; }
        .bg-bd-blue { background-color: #1664FF; }
        .border-bd-blue { border-color: #1664FF; }
        .bg-bd-blue-light { background-color: #E8F3FF; }
    </style>
</head>
<body class="bg-gray-400 font-sans text-[#1D2129] min-h-screen overflow-hidden">

    <!-- 全屏半透明遮罩背景 -->
    <div class="fixed inset-0 bg-black/40 flex justify-end z-50">
        
        <!-- 右侧划出抽屉 -->
        <div class="w-[1000px] bg-white h-full shadow-2xl flex flex-col transform transition-transform duration-300 translate-x-0">
            
            <!-- 1. 抽屉头部 -->
            <div class="px-6 py-4 flex items-center justify-between border-b border-[#E5E6EB] shrink-0 bg-white z-20">
                <div class="flex items-center">
                    <h2 class="text-[16px] font-bold text-[#1D2129] mr-3">xxxPolo衫商品 - 负向原声分析</h2>
                </div>
                <div class="flex items-center space-x-3">
                    <button class="text-[13px] text-[#4E5969] border border-[#E5E6EB] px-3 py-1.5 rounded hover:text-bd-blue hover:border-bd-blue transition flex items-center bg-white">
                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> 导出明细
                    </button>
                    <button class="text-[#86909C] hover:text-[#1D2129] p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>

            <!-- 2. 顶部可切换的指标卡容器 -->
            <div id="cards-container" class="px-6 py-4 bg-[#F7F8FA] border-b border-[#E5E6EB] grid grid-cols-3 gap-4 shrink-0">
                <!-- 动态渲染 3 大类卡片 -->
            </div>

            <!-- 3. 主体分屏区域 -->
            <div class="flex flex-1 overflow-hidden bg-white">
                
                <!-- 左侧：词云标签切换列表 -->
                <div class="w-[240px] border-r border-[#E5E6EB] flex flex-col shrink-0 bg-white z-10">
                    <div class="px-4 py-3 border-b border-[#E5E6EB] bg-[#F7F8FA] flex justify-between items-center">
                        <span class="text-[12px] text-[#4E5969] font-medium">负向词云标签</span>
                        <span class="text-[12px] text-[#86909C]">条数</span>
                    </div>
                    <div id="tags-container" class="flex-1 overflow-y-auto custom-scroll py-1">
                        <!-- 动态渲染标签 -->
                    </div>
                </div>

                <!-- 右侧：Tab切换与明细表格 -->
                <div class="flex-1 flex flex-col relative overflow-hidden bg-[#F7F8FA]">
                    
                    <!-- 二级原因 Tab 栏 -->
                    <div class="bg-white px-5 pt-3 border-b border-[#E5E6EB] shrink-0">
                        <div class="flex items-center mb-1 text-[12px] text-gray-500 font-medium">
                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                            二级归因筛选
                        </div>
                        <div id="tabs-container" class="flex space-x-6">
                            <!-- 动态渲染 Tab -->
                        </div>
                    </div>

                    <!-- 操作栏 -->
                    <div class="px-5 py-3 flex justify-between items-center shrink-0 bg-white">
                        <div class="flex items-center">
                            <h3 class="text-[14px] font-bold text-[#1D2129] mr-2">实时原声截取</h3>
                            <span class="text-[11px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200">预测置信度 > 0.70</span>
                        </div>
                    </div>

                    <!-- 表格区域 -->
                    <div class="flex-1 overflow-auto custom-scroll px-5 pb-5 bg-white">
                        <table class="w-full text-left text-[13px]">
                            <thead class="bg-[#F7F8FA] text-[#86909C] sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="px-3 py-2.5 font-normal w-[15%] rounded-l-md">原声来源</th>
                                    <th class="px-3 py-2.5 font-normal w-[50%]">客诉原声 / 评价内容</th>
                                    <th class="px-3 py-2.5 font-normal w-[20%]">查看完整对话</th>
                                    <th class="px-3 py-2.5 font-normal w-[15%] rounded-r-md text-right">操作指引</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-[#F2F3F5] text-[#1D2129]">
                                <!-- 动态渲染表格行 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 交互逻辑脚本 -->
    <script>
        // ------------------ 数据中心 ------------------
        const mockData = {
            // 一级卡片
            cards: [
                { id: 'c1', name: '商品问题', value: 114, gmv: '4.8万', trend: '↑ 12.5%', trendColor: 'text-[#F53F3F]' },
                { id: 'c2', name: '交付时效问题', value: 38, gmv: '1.2万', trend: '↓ 3.4%', trendColor: 'text-[#00B42A]' },
                { id: 'c3', name: '服务问题', value: 16, gmv: '6,400', trend: '↑ 2.1%', trendColor: 'text-[#F53F3F]' }
            ],
            
            // 二级 Tab
            tabs: {
                'c1': [
                    { id: 'tab1_1', name: '质量差', count: 84 },
                    { id: 'tab1_2', name: '无用户权益(无运费险)', count: 25 },
                    { id: 'tab1_3', name: '商品缺货', count: 5 }
                ],
                'c2': [
                    { id: 'tab2_1', name: '发货慢', count: 26 },
                    { id: 'tab2_2', name: '物流慢/停滞', count: 12 }
                ],
                'c3': [
                    { id: 'tab3_1', name: '客服态度差', count: 10 },
                    { id: 'tab3_2', name: '回复敷衍/慢', count: 6 }
                ]
            },

            // 三级标签树
            tags: {
                'tab1_1': [
                    { id: 't1', name: '做工粗糙线头多', count: 28 },
                    { id: 't2', name: '衣服太透/外观缺陷', count: 24 },
                    { id: 't3', name: '面料扎人', count: 15 },
                    { id: 't4', name: '开线脱线破洞', count: 8 },
                    { id: 't5', name: '掉色严重', count: 6 }
                ],
                'tab1_2': [
                    { id: 't6', name: '没有运费险吗', count: 15 },
                    { id: 't7', name: '退货邮费怎么算', count: 10 }
                ]
            },

            // 四级表格 (操作指引交替更新)
            content: {
                't1': [
                    { source: '飞鸽咨询', sourceStyle: 'text-blue-600 bg-blue-50 border-blue-100', text: '衣服上面有<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">多处线头</strong>', action: '发布新品' },
                    { source: '商品差评', sourceStyle: 'text-red-600 bg-red-50 border-red-100', text: '<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">质量不是很好</strong>，<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">到处都是线头</strong>', action: '编辑商品' },
                    { source: '退款留言', sourceStyle: 'text-orange-600 bg-orange-50 border-orange-100', text: '好多地方有问题，<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">接头好多</strong>', action: '配置挽单' }
                ],
                't2': [
                    { source: '商品差评', sourceStyle: 'text-red-600 bg-red-50 border-red-100', text: '这件白色短袖<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">特别透根本穿不成</strong>！', action: '编辑商品' },
                    { source: '退款留言', sourceStyle: 'text-orange-600 bg-orange-50 border-orange-100', text: '衣服上有脏东西，<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">还特别透</strong>', action: '发布新品' }
                ]
            }
        };

        // ------------------ 全局状态 ------------------
        let currentCardId = 'c1';
        let currentTabId = 'tab1_1';
        let currentTagId = 't1';

        // ------------------ 渲染逻辑 ------------------
        
        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = mockData.cards.map(card => {
                const isActive = card.id === currentCardId;
                return `
                    <div onclick="handleCardClick('${card.id}')" 
                         class="${isActive ? 'bg-bd-blue-light border-2 border-bd-blue shadow-sm relative' : 'bg-white border border-[#E5E6EB] hover:shadow-sm group'} p-3.5 rounded-md cursor-pointer transition">
                        ${isActive ? '<div class="absolute -bottom-[7px] left-1/2 transform -translate-x-1/2 w-3 h-3 bg-white border-b-2 border-r-2 border-bd-blue rotate-45"></div>' : ''}
                        <div class="text-[13px] ${isActive ? 'text-bd-blue font-bold' : 'text-[#4E5969] font-medium group-hover:text-bd-blue'} mb-1">${card.name}</div>
                        <div class="flex items-end justify-between mt-2">
                            <div><span class="text-[22px] font-bold ${isActive ? 'text-bd-blue' : 'text-gray-900'}">${card.value}</span><span class="text-[12px] ${isActive ? 'text-blue-400' : 'text-gray-400'} ml-1">个客诉</span></div>
                            <div class="text-[12px] ${card.trendColor} ${isActive ? 'font-medium' : ''}">${card.trend}</div>
                        </div>
                        <div class="mt-2.5 pt-2 border-t ${isActive ? 'border-blue-200' : 'border-gray-100'} flex items-center justify-between text-[11px]">
                            <span class="${isActive ? 'text-blue-500' : 'text-gray-400'}">退款金额</span>
                            <span class="font-medium ${isActive ? 'text-bd-blue' : 'text-gray-700'}">¥${card.gmv}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            const tabs = mockData.tabs[currentCardId] || [];
            if (!tabs.find(t => t.id === currentTabId)) {
                currentTabId = tabs[0] ? tabs[0].id : null;
            }
            container.innerHTML = tabs.map(tab => {
                const isActive = tab.id === currentTabId;
                return `
                    <div onclick="handleTabClick('${tab.id}')" 
                         class="cursor-pointer py-2 border-b-2 transition ${isActive ? 'border-bd-blue text-bd-blue font-bold' : 'border-transparent text-[#4E5969] hover:text-gray-900'} text-[13px]">
                        ${tab.name} <span class="text-[11px] ${isActive ? 'text-blue-400' : 'text-gray-400'} ml-0.5">(${tab.count})</span>
                    </div>
                `;
            }).join('');
            renderTags();
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            const tags = mockData.tags[currentTabId] || [
                { id: 'd1', name: '其他常规客诉', count: 12 },
                { id: 'd2', name: '详情反馈', count: 8 }
            ];
            if (!tags.find(t => t.id === currentTagId)) {
                currentTagId = tags[0] ? tags[0].id : null;
            }
            container.innerHTML = tags.map(tag => {
                const isActive = tag.id === currentTagId;
                return `
                    <div onclick="handleTagClick('${tag.id}')" 
                         class="px-4 py-3.5 cursor-pointer flex justify-between items-center transition group 
                         ${isActive ? 'bg-bd-blue-light border-l-2 border-bd-blue' : 'border-l-2 border-transparent hover:bg-[#F2F3F5]'}">
                        <span class="text-[13px] flex items-center ${isActive ? 'font-bold text-bd-blue' : 'text-[#1D2129] group-hover:text-bd-blue'}">
                            ${tag.name}
                        </span>
                        <span class="text-[13px] ${isActive ? 'font-bold text-bd-blue' : 'text-[#86909C]'}">${tag.count}</span>
                    </div>
                `;
            }).join('');
            renderContent();
        }

        function renderContent() {
            if (!currentTagId) return;
            
            let rows = mockData.content[currentTagId];
            if (!rows) {
                // 动态生成兜底表格数据，并交替展示动作
                const tagName = (mockData.tags[currentTabId] || []).find(t => t.id === currentTagId)?.name || '该问题';
                const actionList = ['发布新品', '编辑商品', '配置挽单']; // 操作指引动作库
                
                rows = [
                    { source: '退款留言', sourceStyle: 'text-orange-600 bg-orange-50 border-orange-100', text: `这商品竟然<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">${tagName}</strong>，要求退款！`, action: actionList[0] },
                    { source: '飞鸽咨询', sourceStyle: 'text-blue-600 bg-blue-50 border-blue-100', text: `<span class="text-gray-400">买家:</span> 收到货发现<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">${tagName}</strong>，怎么办啊？`, action: actionList[1] },
                    { source: '商品差评', sourceStyle: 'text-red-600 bg-red-50 border-red-100', text: `质量太差了，严重的<strong class="text-[#F53F3F] bg-red-50 px-0.5 rounded">${tagName}</strong>问题！`, action: actionList[2] }
                ];
            }

            document.getElementById('table-body').innerHTML = rows.map(row => `
                <tr class="hover:bg-[#F7F8FA] transition group">
                    <td class="px-3 py-3.5 align-top">
                        <span class="text-[10px] ${row.sourceStyle} px-1.5 py-0.5 rounded border mr-1.5">${row.source}</span>
                    </td>
                    <td class="px-3 py-3.5 align-top leading-relaxed pr-6 text-[#1D2129]">
                        ${row.text}
                    </td>
                    <td class="px-3 py-3.5 align-top text-[#86909C] text-[12px]">
                        <a href="#" class="text-bd-blue hover:text-blue-700 hover:underline flex items-center">
                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                            飞鸽对话明细
                        </a>
                    </td>
                    <td class="px-3 py-3.5 align-top text-right">
                        <!-- 去掉动态颜色判断，统一使用蓝色加粗样式 -->
                        <a href="#" class="text-bd-blue hover:text-blue-800 font-medium text-[12px]">${row.action}</a>
                    </td>
                </tr>
            `).join('');
        }

        // ------------------ 事件处理 ------------------
        function handleCardClick(cardId) {
            currentCardId = cardId;
            renderCards();
            renderTabs(); 
        }

        function handleTabClick(tabId) {
            currentTabId = tabId;
            renderTabs();
        }

        function handleTagClick(tagId) {
            currentTagId = tagId;
            renderTags(); 
        }

        // ------------------ 初始化 ------------------
        window.onload = () => {
            renderCards();
            renderTabs();
        };
    </script>
</body>
</html>
